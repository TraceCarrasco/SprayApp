name: namer_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.4+2

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1

  english_words: ^4.0.0
  xml: ^6.3.0
  provider: ^6.1.5
  supabase_flutter: ^2.9.1
  http: ^1.4.0
  fl_chart: ^0.68.0
  uuid: ^4.4.0
  firebase_core: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  video_player: ^2.9.2
  chewie: ^1.10.0
  image_picker: ^1.1.2
  video_compress: ^3.1.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/spray_wall.jpeg
    - assets/FA_logo.png

flutter_launcher_icons:
  remove_alpha_ios: true
  ios: true
  image_path: "assets/FA_logo.png"

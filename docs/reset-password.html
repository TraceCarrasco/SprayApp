<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – SprayApp</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --border: #262626;
      --accent: #4f8ef7;
      --text: #e8e8e8;
      --muted: #666;
      --error: #ef4444;
      --success: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .message.error { background: #1f0a0a; color: var(--error); border: 1px solid var(--error); }
    .message.success { background: #0a1f0e; color: var(--success); border: 1px solid var(--success); }
    #loading { color: var(--muted); font-size: 0.95rem; text-align: center; }
    #invalid { display: none; text-align: center; color: var(--muted); }
    #form-section { display: none; }
    #success-section { display: none; text-align: center; }
    #success-section h2 { color: var(--success); margin-bottom: 8px; }
    #success-section p { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">Verifying reset link…</div>

    <div id="invalid">
      <p>This reset link is invalid or has expired.</p>
      <p style="margin-top:8px;font-size:0.85rem;">Please request a new password reset from the app.</p>
    </div>

    <div id="form-section">
      <h1>Set New Password</h1>
      <p class="subtitle">Choose a new password for your account.</p>
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Re-enter password" />
      <button id="submit-btn" onclick="submitPassword()">Update Password</button>
      <div id="message" class="message"></div>
    </div>

    <div id="success-section">
      <h2>Password updated!</h2>
      <p>You can now log in to the SprayApp with your new password.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://foildoggpbubivuigqmj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZvaWxkb2dncGJ1Yml2dWlncW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM3MTUzNTgsImV4cCI6MjA2OTI5MTM1OH0.f2n8gquVdGel81MyE4dD9M68B-IHk-DIxyWaaunbuIc';

    // detectSessionInUrl: true lets the SDK read #access_token from the URL hash (implicit flow)
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: true }
    });

    let recoveryReady = false;

    client.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryReady = true;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
      } else if (event === 'INITIAL_SESSION' && !session) {
        // No token in URL at all
        document.getElementById('loading').style.display = 'none';
        document.getElementById('invalid').style.display = 'block';
      }
    });

    // Safety fallback: if nothing fires after 5s, show invalid
    setTimeout(() => {
      if (!recoveryReady && document.getElementById('loading').style.display !== 'none') {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('invalid').style.display = 'block';
      }
    }, 5000);

    async function submitPassword() {
      const password = document.getElementById('password').value.trim();
      const confirm = document.getElementById('confirm').value.trim();
      const msg = document.getElementById('message');
      const btn = document.getElementById('submit-btn');

      msg.style.display = 'none';

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }
      if (password !== confirm) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        showMessage(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      }
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
